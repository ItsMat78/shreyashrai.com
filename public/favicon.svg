<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SR">
  <style>
    :root { --bg: #faf9f6; --fg: #2430dd; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #141413; --fg: #96a1ff; }
    }
    rect { fill: var(--bg); }
    text { fill: var(--fg); }
  </style>
  <rect width="64" height="64" rx="12" />
  <text x="32" y="45" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="600">SR</text>
</svg>
